name: Materialize Recurrings

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  materialize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set run date
        id: date
        run: |
          RUN_DATE=$(TZ=Asia/Jerusalem date +%F)
          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"

      - name: Materialize due recurrings into expenses
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
          RUN_DATE: ${{ steps.date.outputs.run_date }}
        run: |
          npx convex run recurrings:materializeDueExpensesForAllUsers "{\"runDate\":\"$RUN_DATE\"}"
